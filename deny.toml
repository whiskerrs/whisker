# cargo-deny configuration — supply-chain hygiene for the workspace.
#
# Run locally with `cargo install cargo-deny` then `cargo deny check`.
# CI gates on `advisories`, `bans`, and `sources` (see
# .github/workflows/ci.yml); `licenses` is configured here for local
# use and can be promoted to a CI gate once the allow-list below is
# confirmed to cover every transitive dependency.

[advisories]
# RUSTSEC advisory database. Fail the check on any vulnerable or
# yanked crate in the dependency tree.
version = 2
yanked = "deny"
# Unmaintained (not vulnerable) transitive crates with no available
# safe upgrade. Accepted as noise — revisit if a maintained
# replacement reaches our tree or the upstream lib drops them:
#   RUSTSEC-2024-0436  paste         ← ratatui   (dev-loop TUI)
#   RUSTSEC-2025-0119  number_prefix ← indicatif (progress output)
#   RUSTSEC-2026-0173  proc-macro-error2 ← age's i18n-embed-fl proc-macro
#     (whisker-credentials' file encryption). Build-time only — never
#     compiled into shipped binaries. age has no feature to drop its
#     localization layer; revisit when age moves off i18n-embed-fl.
#
# Vulnerability accepted with rationale (no compatible fixed version):
#   RUSTSEC-2026-0119  hickory-proto 0.24.4 ← atrium-identity's DoH TXT
#     resolver, examples/bluesky ONLY. O(n²) CPU during DNS *message
#     encoding* — reachable only by encoding a message with many
#     compressible names. The example encodes a single `_atproto.<handle>`
#     TXT query (one name) against a trusted DoH endpoint, so the
#     pathological input isn't reachable. The fix lands in hickory 0.25,
#     which atrium 0.24 doesn't yet allow. Revisit on the atrium bump.
ignore = [
    "RUSTSEC-2024-0436",
    "RUSTSEC-2025-0119",
    "RUSTSEC-2026-0173",
    "RUSTSEC-2026-0119",
]

[bans]
# The tree currently double-pins `tungstenite` / `tokio-tungstenite`
# (0.21 via the dev-runtime client, 0.29 via axum on the host). Warn
# rather than deny so this is visible without blocking CI until the
# versions are unified.
multiple-versions = "warn"
wildcards = "deny"
# The in-repo example crates (examples/podcast/*) depend on each other
# by `path` with no version field, which cargo treats as a wildcard
# requirement. Exempt path deps from the wildcard ban — they're never
# published, so the version requirement is irrelevant.
allow-wildcard-paths = true

[licenses]
# Permissive licenses compatible with Whisker's own MIT OR Apache-2.0.
# Not yet a CI gate — see the file header.
version = 2
confidence-threshold = 0.9
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
]

[sources]
# Only allow crates from crates.io. Any git or alternative-registry
# dependency must be added here explicitly — keeps an accidental
# unaudited git dep from sneaking in.
unknown-registry = "deny"
unknown-git = "deny"
