[workspace]
resolver = "2"
members = [
    "crates/tuft",
    "crates/tuft-app-config",
    "crates/tuft-build",
    "crates/tuft-cli",
    "crates/tuft-codegen",
    "crates/tuft-dev-runtime",
    "crates/tuft-driver",
    "crates/tuft-driver-sys",
    "crates/tuft-macros",
    "crates/tuft-plugin",
    "crates/tuft-runtime",
    "examples/hello-world",
    "xtask",
]
exclude = []

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
repository = "https://github.com/tuftrs/tuft"
authors = ["itome <dev@itome.team>"]

[workspace.dependencies]
tuft = { path = "crates/tuft", version = "0.1.0" }
tuft-app-config = { path = "crates/tuft-app-config", version = "0.1.0" }
tuft-build = { path = "crates/tuft-build", version = "0.1.0" }
tuft-codegen = { path = "crates/tuft-codegen", version = "0.1.0" }
tuft-dev-runtime = { path = "crates/tuft-dev-runtime", version = "0.1.0" }
tuft-driver = { path = "crates/tuft-driver", version = "0.1.0" }
tuft-driver-sys = { path = "crates/tuft-driver-sys", version = "0.1.0" }
tuft-macros = { path = "crates/tuft-macros", version = "0.1.0" }
tuft-plugin = { path = "crates/tuft-plugin", version = "0.1.0" }
tuft-runtime = { path = "crates/tuft-runtime", version = "0.1.0" }

anyhow = "1"
thiserror = "2"
