[workspace]
resolver = "2"
members = [
    "crates/tuft",
    "crates/tuft-app-config",
    "crates/tuft-cli",
    "crates/tuft-codegen",
    "crates/tuft-dev-runtime",
    "crates/tuft-dev-server",
    "crates/tuft-driver",
    "crates/tuft-driver-sys",
    "crates/tuft-macros",
    "crates/tuft-plugin",
    "crates/tuft-runtime",
    "examples/hello-world",
    "examples/subsecond-poc",
    "xtask",
]
exclude = [
    # Throwaway cdylib the dev-server's `thin_rebuild` integration
    # test compiles standalone. Must NOT be a workspace member or
    # cargo would try to build it as part of the regular workspace
    # build (and we'd lose the "fresh-from-scratch crate" property
    # the test relies on).
    "crates/tuft-dev-server/tests/fixtures/thin-build-fixture",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
repository = "https://github.com/tuftrs/tuft"
authors = ["itome <dev@itome.team>"]

[workspace.dependencies]
tuft = { path = "crates/tuft", version = "0.1.0" }
tuft-app-config = { path = "crates/tuft-app-config", version = "0.1.0" }
tuft-codegen = { path = "crates/tuft-codegen", version = "0.1.0" }
tuft-dev-runtime = { path = "crates/tuft-dev-runtime", version = "0.1.0" }
tuft-dev-server = { path = "crates/tuft-dev-server", version = "0.1.0" }
tuft-driver = { path = "crates/tuft-driver", version = "0.1.0" }
tuft-driver-sys = { path = "crates/tuft-driver-sys", version = "0.1.0" }
tuft-macros = { path = "crates/tuft-macros", version = "0.1.0" }
tuft-plugin = { path = "crates/tuft-plugin", version = "0.1.0" }
tuft-runtime = { path = "crates/tuft-runtime", version = "0.1.0" }

anyhow = "1"
thiserror = "2"

# Rust hot-patching runtime (receive side only — we build our own
# `tuft run` watcher / sender rather than depending on `dx serve`).
# Used by tuft-driver and the subsecond-poc example.
subsecond = "0.7"
subsecond-types = "0.7"

# Dev-time WebSocket receiver — pulled in only via the `hot-reload`
# feature, never present in release builds. Async stack kept minimal:
# current-thread tokio + tungstenite over std TcpStream.
tokio = { version = "1", default-features = false }
tokio-tungstenite = { version = "0.21", default-features = false }
futures-util = { version = "0.3", default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Host-side dev server (tuft-dev-server). Heavy deps confined here.
axum = { version = "0.8", default-features = false, features = ["ws", "tokio", "http1"] }
notify = { version = "8", default-features = false, features = ["macos_fsevent"] }
# Reading ELF / Mach-O / WASM symbol tables for subsecond JumpTable
# construction. Same crate `dx serve` and `subsecond` itself use,
# which keeps semantics identical and avoids ABI mismatch hazards.
object = { version = "0.36", default-features = false, features = ["read", "std"] }
