[workspace]
resolver = "2"
members = [
    "crates/lyra",
    "crates/lyra-app-config",
    "crates/lyra-cli",
    "crates/lyra-codegen",
    "crates/lyra-dev-runtime",
    "crates/lyra-ffi-lynx",
    "crates/lyra-macros",
    "crates/lyra-plugin",
    "crates/lyra-runtime",
    "xtask",
]
exclude = [
    "examples",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
repository = "https://github.com/itome/lyra"
authors = ["itome <dev@itome.team>"]

[workspace.dependencies]
lyra = { path = "crates/lyra", version = "0.1.0" }
lyra-app-config = { path = "crates/lyra-app-config", version = "0.1.0" }
lyra-codegen = { path = "crates/lyra-codegen", version = "0.1.0" }
lyra-dev-runtime = { path = "crates/lyra-dev-runtime", version = "0.1.0" }
lyra-ffi-lynx = { path = "crates/lyra-ffi-lynx", version = "0.1.0" }
lyra-macros = { path = "crates/lyra-macros", version = "0.1.0" }
lyra-plugin = { path = "crates/lyra-plugin", version = "0.1.0" }
lyra-runtime = { path = "crates/lyra-runtime", version = "0.1.0" }

anyhow = "1"
thiserror = "2"
