[workspace]
resolver = "2"
members = [
    "crates/whisker",
    "crates/whisker-app-config",
    "crates/whisker-cli",
    "crates/whisker-codegen",
    "crates/whisker-dev-runtime",
    "crates/whisker-dev-server",
    "crates/whisker-driver",
    "crates/whisker-driver-sys",
    "crates/whisker-macros",
    "crates/whisker-plugin",
    "crates/whisker-runtime",
    "examples/hello-world",
    "examples/subsecond-poc",
    "xtask",
]
exclude = [
    # Throwaway cdylib the dev-server's `thin_rebuild` integration
    # test compiles standalone. Must NOT be a workspace member or
    # cargo would try to build it as part of the regular workspace
    # build (and we'd lose the "fresh-from-scratch crate" property
    # the test relies on).
    "crates/whisker-dev-server/tests/fixtures/thin-build-fixture",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
repository = "https://github.com/whiskerrs/whisker"
authors = ["itome <dev@itome.team>"]

[workspace.dependencies]
whisker = { path = "crates/whisker", version = "0.1.0" }
whisker-app-config = { path = "crates/whisker-app-config", version = "0.1.0" }
whisker-codegen = { path = "crates/whisker-codegen", version = "0.1.0" }
whisker-dev-runtime = { path = "crates/whisker-dev-runtime", version = "0.1.0" }
whisker-dev-server = { path = "crates/whisker-dev-server", version = "0.1.0" }
whisker-driver = { path = "crates/whisker-driver", version = "0.1.0" }
whisker-driver-sys = { path = "crates/whisker-driver-sys", version = "0.1.0" }
whisker-macros = { path = "crates/whisker-macros", version = "0.1.0" }
whisker-plugin = { path = "crates/whisker-plugin", version = "0.1.0" }
whisker-runtime = { path = "crates/whisker-runtime", version = "0.1.0" }

anyhow = "1"
thiserror = "2"

# Rust hot-patching runtime (receive side only — we build our own
# `whisker run` watcher / sender rather than depending on `dx serve`).
# Used by whisker-driver and the subsecond-poc example.
#
# We pin to a vendored fork (see `[patch.crates-io]` below) that
# anchors the ASLR-slide lookup on `whisker_aslr_anchor` instead of
# `main`. The upstream lookup `dlsym(RTLD_DEFAULT, "main")` is
# unsafe in Whisker's dylib-based runtime on Android, where multiple
# `main` symbols can exist in the same linker namespace.
subsecond = "0.7"
subsecond-types = "0.7"

# Dev-time WebSocket receiver — pulled in only via the `hot-reload`
# feature, never present in release builds. Async stack kept minimal:
# current-thread tokio + tungstenite over std TcpStream.
tokio = { version = "1", default-features = false }
tokio-tungstenite = { version = "0.21", default-features = false }
futures-util = { version = "0.3", default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Embed the patch dylib bytes in the JSON envelope (text frame).
base64 = "0.22"

# Host-side dev server (whisker-dev-server). Heavy deps confined here.
axum = { version = "0.8", default-features = false, features = ["ws", "tokio", "http1"] }
notify = { version = "8", default-features = false, features = ["macos_fsevent"] }
# Reading ELF / Mach-O / WASM symbol tables for subsecond JumpTable
# construction. Same crate `dx serve` and `subsecond` itself use,
# which keeps semantics identical and avoids ABI mismatch hazards.
object = { version = "0.36", default-features = false, features = [
    "read",
    "std",
    # Needed by `whisker-dev-server::hotpatch::stub_object` to emit
    # the runtime-address jump-stub `.o` linked into every hot patch
    # (Option B / Dioxus-style symbol resolution).
    "write",
] }

# Vendored subsecond fork — see the rationale on the `subsecond`
# workspace dep above.
[patch.crates-io]
subsecond = { path = "vendored/subsecond" }
