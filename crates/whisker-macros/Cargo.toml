[package]
name = "whisker-macros"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Procedural macros for Whisker: #[whisker::main], rsx!"

[lib]
proc-macro = true

[dependencies]
proc-macro2 = "1"
quote = "1"
syn = { version = "2", features = ["full"] }

# tests/ra_completion.rs drives rust-analyzer over LSP to verify
# that `render! { view(sty|) }` and friends actually surface the
# expected completions. JSON for the protocol; no heavier deps so
# the test binary stays cheap to build.
[dev-dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
