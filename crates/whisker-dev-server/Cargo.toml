[package]
name = "whisker-dev-server"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Host-side dev server for `whisker run`. File watch + cargo build + WebSocket push of subsecond patches. Pulled in by whisker-cli; no presence in release builds."

[dependencies]
anyhow = { workspace = true }
axum = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "net", "io-util", "sync", "time", "process"] }
futures-util = { workspace = true, default-features = true }
serde = { workspace = true }
serde_json = { workspace = true }
subsecond-types = { workspace = true }
notify = { workspace = true }
object = { workspace = true }
# Workspace dep-graph walk for sub-crate hot-reload: enumerate path
# deps of the user crate so the file watcher can cover their src/
# trees and the patcher knows which crate a changed file belongs to.
cargo_metadata = "0.18"
# Cold-rebuild orchestration. The same crate the `whisker-build`
# binary (called from gradle / xcodebuild Build Phase) drives.
whisker-build = { workspace = true }

[dev-dependencies]
# Async runtime for integration tests (#[tokio::test]).
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "process"] }
# A minimal client to drive the WebSocket server in tests. The
# production receiver in whisker-dev-runtime uses the same crate.
tokio-tungstenite = { workspace = true, features = ["connect"] }
