name: {{ios_scheme}}
options:
  bundleIdPrefix: {{ios_bundle_id_prefix}}
  deploymentTarget:
    iOS: '{{ios_deployment_target}}'
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: '5.9'
    IPHONEOS_DEPLOYMENT_TARGET: '{{ios_deployment_target}}'

packages:
  # SPM package shipped by Whisker (path resolved by `whisker-cli`).
  WhiskerRuntime:
    path: {{whisker_runtime_ios_path}}

targets:
  {{ios_scheme}}:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: {{app_name}}
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: {{ios_bundle_id}}
        TARGETED_DEVICE_FAMILY: '1,2'
        # Resolve `@rpath/WhiskerDriver.framework/WhiskerDriver` (and
        # the Lynx frameworks that ship inside WhiskerRuntime's SPM
        # binaryTargets) at runtime. dyld walks this list of rpaths
        # for each `@rpath/…` install_name; without this entry the
        # embedded frameworks under `<App>.app/Frameworks/` would not
        # be found and dyld would abort the launch.
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
    dependencies:
      # `WhiskerRuntime` is a Swift library product — links statically
      # into the host app's main binary. The dynamic binaryTargets
      # inside the package (`WhiskerDriver`, `Lynx`, `LynxBase`,
      # `LynxServiceAPI`, `PrimJS`) are auto-embedded by Xcode 14+ into
      # `<App>.app/Frameworks/` based on the host target's product
      # type, so no explicit `embed:` flag is needed here.
      - package: WhiskerRuntime
