[package]
name = "whisker-config"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
description = "Config types used in whisker.rs to declare app metadata."

[dependencies]
# Serde derives ride along on the Config types so the `whisker run`
# config probe can serialize the user's `whisker.rs::configure` output
# as JSON for the dev-server to consume. The probe pulls in only this
# crate + serde + serde_json — keeping the dependency graph small is
# what makes the probe build cheap (single-digit seconds first time,
# cached afterwards).
serde = { workspace = true }
# `app.plugin::<MyPlugin>(|c| ...)` serializes the typed Config
# (reached via `<MyPlugin as Plugin>::Config`) into a
# `serde_json::Value` stored under `plugins[Config::NAME]`. The probe
# already pulls serde_json transitively, so adding it here just
# makes the dep explicit.
serde_json = { workspace = true }
# `PluginConfig` trait — `app.plugin::<T>()` is generic over it and
# reads `T::NAME` to key the entry inside `plugins`.
whisker-plugin = { workspace = true }
# `Plugin::apply` returns `anyhow::Result<()>` — needed by the
# `AppIcon` marker's (no-op) Plugin impl. Already in the probe dep
# graph transitively via whisker-plugin, so this adds no probe cost.
anyhow = { workspace = true }
