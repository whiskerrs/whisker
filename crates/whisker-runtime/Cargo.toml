[package]
name = "whisker-runtime"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Core runtime for Whisker: reactive primitives, element tree, Lynx integration."

[dependencies]
thiserror = { workspace = true }
# Generational slot map for reactive node / owner storage. Generational
# keys mean a disposed slot can't be confused with a fresh allocation
# at the same index — critical for `Copy` signal handles that may
# outlive their owner.
slotmap = "1"
# Single-threaded futures executor (LocalPool) driven by Whisker's
# tick callback. Used by the `tasks` module to host async work
# (resource fetchers, user-spawned futures) on the TASM thread
# without pulling in tokio's full IO/scheduler infrastructure.
futures-executor = "0.3"
futures-util = { version = "0.3", default-features = false, features = ["std"] }
# `oneshot` channel for `run_blocking` — closes the gap between a
# worker thread completing sync work and the main-thread future
# awaiting the result.
futures-channel = "0.3"
# `ArcWake` trait + `waker_ref` helper for the in-runtime futures
# executor (see `tasks` module). Pulls in `futures-core` transitively
# — both are tiny, no_std-friendly crates with no async-runtime
# dependencies (we deliberately don't pull `tokio` or similar).
futures-task = "0.3"
