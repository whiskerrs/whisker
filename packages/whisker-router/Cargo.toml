[package]
name = "whisker-router"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
description = "Type-safe signal-backed routing for Whisker — single-engine, custom animations, nested layouts (tabs/modal). RFC: https://github.com/whiskerrs/whisker/issues/95"

include = [
    "Cargo.toml",
    "Package.swift",
    "build.gradle.kts",
    "src/**/*.rs",
    "bin/**/*.rs",
    "android/**/*.kt",
    "ios/**/*.swift",
    "README.md",
]

# rlib only — the module-system distribution path handles the native
# sources separately. Same pattern as whisker-local-store /
# whisker-image / whisker-video.
[lib]
crate-type = ["rlib"]

# Module-system opt-in marker. The Whisker build pipeline scans dep
# trees for this table to discover module crates and stage their
# `ios/` + `android/` directories into the platform builds.
[package.metadata.whisker]

# Plugin registration — Whisker walks the consuming app's dep tree, picks
# this up, builds the `whisker-router-plugin` binary below, and runs it on
# every `whisker build` / `whisker run` gen sync. It is unconditional (no
# user opt-in): the router needs `android:enableOnBackInvokedCallback`
# on `<application>` for its Android predictive-back gesture, so it
# declares that requirement itself.
[package.metadata.whisker.plugins.whisker-router]
bin = "whisker-router-plugin"

# Subprocess binary entry point. Reads a `PluginRequest` JSON from stdin,
# mutates the IR via `RouterPlugin::apply`, writes a `PluginResponse` JSON.
[[bin]]
name = "whisker-router-plugin"
path = "bin/whisker_router_plugin.rs"
test = false
bench = false
doc = false

[dependencies]
whisker = { workspace = true }
# Plugin support (trait + IR types + JSON envelope + subprocess runner).
# Light deps so the config-probe build path stays cheap.
whisker-plugin = { workspace = true }
serde = { workspace = true }
anyhow = { workspace = true }
# NOTE: the old `#[route]` enum macro lived in whisker-router-macros and
# is no longer re-exported (the new core/render layers don't use it). The
# macro crate is kept in the workspace; the `routes!` macro will be added
# there and this dependency restored in a later phase.

[dev-dependencies]
# Test-only: drive animation frames (`__step_for_tests`) so the
# render-layer tests can advance a push/pop transition to completion and
# assert the wrappers settle to their resting pose.
whisker-animation = { workspace = true }
# Test-only: drive `RouterPlugin` through the real CNG engine + Android
# renderer (`tests/plugin_e2e.rs`) and assert the generated manifest gets
# `enableOnBackInvokedCallback`. No cycle: whisker-cng depends on
# whisker-plugin / whisker-config, never on whisker-router.
whisker-cng = { workspace = true }
whisker-config = { workspace = true }
