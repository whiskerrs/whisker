[package]
name = "whisker-audio"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Whisker platform module — audio playback backed by ExoPlayer (Android) / AVPlayer (iOS). Mirrors expo-audio's surface: a `<whisker-audio:Player>` element wired to a `Player` typed handle for imperative play/pause/seek, with reactive `position` / `duration` / `is_playing` signals fed by native playback events."

# Phase K — explicit `include` list so a `cargo publish` of this
# crate ships the Kotlin + Swift platform sources alongside
# `src/lib.rs`.
include = [
    "Cargo.toml",
    "Package.swift",
    "build.gradle.kts",
    "src/lib.rs",
    "src/cng.rs",
    "bin/**/*.rs",
    "android/**/*.kt",
    "ios/**/*.swift",
    "README.md",
]

[lib]
crate-type = ["rlib"]

# Module-system opt-in marker. The bare table identifies this cargo
# crate as a Whisker module; `whisker-build` walks the consuming
# app's dep tree, picks out every dep carrying it, and wires the
# Android Gradle subproject + iOS SwiftPM package into the host build.
[package.metadata.whisker]

# CNG plugin registration — `whisker-cng::discovery` walks the
# consuming app's dep tree, picks this entry up, builds the
# `whisker-audio-plugin` binary below, and registers it as a
# `SubprocessPlugin` with the engine. The user opts into actual
# behaviour by calling `app.plugin::<WhiskerAudio>(|c| …)` in
# their `whisker.rs`; with no opt-in the plugin runs with
# `Config::default()` and contributes nothing.
[package.metadata.whisker.plugins.whisker-audio]
bin = "whisker-audio-plugin"

# Subprocess binary entry point the CNG engine spawns. Reads a
# `PluginRequest` JSON from stdin, mutates the IR via
# `WhiskerAudio::apply`, writes a `PluginResponse` JSON to
# stdout.
[[bin]]
name = "whisker-audio-plugin"
path = "bin/whisker_audio_plugin.rs"
test = false
bench = false
doc = false

[dependencies]
# `whisker` (the umbrella runtime crate) is gated behind the
# `runtime` feature so the config probe — which only needs the
# `cng` module — can pull this crate with
# `default-features = false` and avoid the multi-minute build of
# the Lynx bridge + driver. The runtime feature is on by default
# so user app crates that depend on `whisker-audio` for actual
# audio playback get the Player runtime without any feature
# flag dance.
whisker = { workspace = true, optional = true }

# CNG plugin support — always on. Light deps (trait + IR types +
# JSON envelope + subprocess runner) so the probe-build path stays
# cheap when `runtime` is disabled.
whisker-plugin = { workspace = true }
serde = { workspace = true }
anyhow = { workspace = true }

[features]
default = ["runtime"]
# Pull in the heavyweight `whisker` umbrella crate (and through it
# the Lynx bridge, driver, render layer). Required by anyone that
# wants to use the `Player` / `PlaybackStatus` API. Default-on so
# normal app dependencies "just work". Off-on-probe so the config
# probe build stays fast.
runtime = ["dep:whisker"]
