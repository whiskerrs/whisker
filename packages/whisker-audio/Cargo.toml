[package]
name = "whisker-audio"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Whisker platform module — audio playback backed by ExoPlayer (Android) / AVPlayer (iOS). Mirrors expo-audio's surface: a `<whisker-audio:Player>` element wired to a `Player` typed handle for imperative play/pause/seek, with reactive `position` / `duration` / `is_playing` signals fed by native playback events."

# Phase K — explicit `include` list so a `cargo publish` of this
# crate ships the Kotlin + Swift platform sources alongside
# `src/lib.rs`.
include = [
    "Cargo.toml",
    "Package.swift",
    "build.gradle.kts",
    "src/lib.rs",
    "src/cng.rs",
    "bin/**/*.rs",
    "android/**/*.kt",
    "ios/**/*.swift",
    "README.md",
]

[lib]
crate-type = ["rlib"]

# Module-system opt-in marker. The bare table identifies this cargo
# crate as a Whisker module; `whisker-build` walks the consuming
# app's dep tree, picks out every dep carrying it, and wires the
# Android Gradle subproject + iOS SwiftPM package into the host build.
[package.metadata.whisker]

# CNG plugin registration — `whisker-cng::discovery` walks the
# consuming app's dep tree, picks this entry up, builds the
# `whisker-audio-plugin` binary below, and registers it as a
# `SubprocessPlugin` with the engine. The user opts into actual
# behaviour by calling `app.plugin::<WhiskerAudioConfig>(|c| …)` in
# their `whisker.rs`; with no opt-in the plugin runs with
# `Config::default()` and contributes nothing.
[package.metadata.whisker.plugins.whisker-audio]
bin = "whisker-audio-plugin"

# Subprocess binary entry point the CNG engine spawns. Reads a
# `PluginRequest` JSON from stdin, mutates the IR via
# `WhiskerAudioPlugin::apply`, writes a `PluginResponse` JSON to
# stdout.
[[bin]]
name = "whisker-audio-plugin"
path = "bin/whisker_audio_plugin.rs"
test = false
bench = false
doc = false

[dependencies]
whisker = { workspace = true }

# CNG plugin support — pulled in unconditionally because the
# `[[bin]]` above always builds. Light deps (trait + IR types +
# JSON envelope + subprocess runner).
whisker-plugin = { workspace = true }
serde = { workspace = true }
anyhow = { workspace = true }
