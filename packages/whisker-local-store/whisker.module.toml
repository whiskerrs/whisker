# Whisker module manifest (v1).
#
# Declares the platform-side source files for `whisker-local-store`,
# the reference Whisker platform module. The consuming app's
# `whisker run` / `whisker build` CLI fold these sources into the
# host iOS framework / Android APK alongside the user app's other
# module crates.
#
# Module-name string: `"WhiskerLocalStore"` — referenced by the
# Rust-side `#[whisker::platform_module(name = "WhiskerLocalStore")]`
# proxy + the DSL `Name("WhiskerLocalStore")` in `LocalStoreModule`.
#
# Phase L-3: migrated to the `ModuleDefinition` DSL. `LocalStoreModule`
# is a view-less `WhiskerModule` subclass (module-level `Function`s,
# no `View(...)` block); `LocalStore` holds the UserDefaults /
# SharedPreferences storage logic.

[ios]
swift_sources = ["src/ios/LocalStoreModule.swift", "src/ios/LocalStore.swift"]

[android]
kotlin_sources = ["src/android/LocalStoreModule.kt", "src/android/LocalStore.kt"]
