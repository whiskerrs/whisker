[package]
name = "whisker-local-store"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Reference Whisker platform module — persistent key-value local store wrapping UserDefaults on iOS and SharedPreferences on Android. Doubles as the documented template for first-party Whisker platform modules."

include = [
    "Cargo.toml",
    "Package.swift",
    "build.gradle.kts",
    "src/lib.rs",
    "android/**/*.kt",
    "ios/**/*.swift",
    "README.md",
]

# rlib only. The Whisker module system handles native-source
# distribution out-of-band via the `android/` + `ios/` package dirs
# — we don't ship a cdylib here. Sibling of `whisker-hello-element`.
[lib]
crate-type = ["rlib"]

# Module-system opt-in marker. See `whisker-video/Cargo.toml` for the
# rationale; the bare table identifies this crate as a Whisker module.
[package.metadata.whisker]

[dependencies]
# Rename `whisker-module` → `whisker` so the proc macros' emit
# paths resolve. See `crates/whisker-module/src/lib.rs` for the
# rationale + contract. Cargo doesn't allow `package = ...` with
# `workspace = true`, so path + version are inlined here.
whisker = { package = "whisker-module", path = "../../crates/whisker-module", version = "0.1.0" }
