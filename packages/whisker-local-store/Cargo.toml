[package]
name = "whisker-local-store"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
description = "Reference Whisker platform module — persistent key-value local store wrapping UserDefaults on iOS and SharedPreferences on Android. Doubles as the documented template for first-party Whisker platform modules."

include = [
    "Cargo.toml",
    "Package.swift",
    "build.gradle.kts",
    "src/lib.rs",
    "android/**/*.kt",
    "ios/**/*.swift",
    "README.md",
]

# rlib only. The Whisker module system handles native-source
# distribution out-of-band via the `android/` + `ios/` package dirs
# — we don't ship a cdylib here. Sibling of `whisker-image` /
# `whisker-video`.
[lib]
crate-type = ["rlib"]

# Module-system opt-in marker. See `whisker-video/Cargo.toml` for the
# rationale; the bare table identifies this crate as a Whisker module.
[package.metadata.whisker]

[dependencies]
# The umbrella `whisker` crate — same dep app crates use. The proc
# macros' emit paths (`::whisker::*`) resolve under the `whisker`
# name. A published module would write `whisker = "0.1"`.
whisker = { workspace = true }
