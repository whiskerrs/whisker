[package]
name = "whisker-icons-example"
version = "0.1.0"
edition = "2021"
publish = false
description = "Example app for `whisker-icons`. Renders the entire Lucide-icon set in a virtualised grid so on-device verification of the codegen + display-list pipeline happens against every icon at once."
build = "build.rs"

[lib]
crate-type = ["rlib"]

[dependencies]
whisker = { workspace = true }
whisker-icons = { path = ".." }
