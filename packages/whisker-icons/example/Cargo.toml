[package]
name = "whisker-icons-example"
version = "0.1.0"
edition = "2024"
publish = false
description = "Example app for `whisker-icons`. Renders the entire Lucide-icon set in a virtualised list so on-device verification of the codegen + display-list pipeline happens against every icon at once."

[lib]
crate-type = ["rlib"]

[dependencies]
whisker = { workspace = true }
whisker-icons = { path = ".." }
# Reactive accessor for the host view's safe-area insets — used to
# push the gallery header below the system status bar / notch on
# both Android (post-edge-to-edge) and iOS. Reads as
# `safe_area_insets().get().top / .bottom` inside a `computed`.
whisker-safe-area = { path = "../../whisker-safe-area" }
