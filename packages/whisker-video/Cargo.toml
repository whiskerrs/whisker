[package]
name = "whisker-video"
version = "0.1.0"
edition = "2021"
publish = false
description = "Whisker platform component module — `whisker-video:Video` element backed by AVPlayer on iOS / VideoView on Android. Demonstrates `@WhiskerUIMethod` (`play()`, `pause()`, `seek(position)`) and `ElementRef<T>` for imperative Rust-side control of a mounted element."

[lib]
crate-type = ["rlib"]

[dependencies]
# Rename `whisker-module-api` → `whisker` so the proc macros' emit
# paths (`::whisker::ElementRef`, `::whisker::runtime::view::Element`,
# `::whisker::platform_module::WhiskerValue`, …) resolve in this
# module crate. The umbrella `whisker` crate isn't a dep — module
# crates only need the smaller `whisker-module-api` surface. See
# `crates/whisker-module-api/src/lib.rs` for the contract.
#
# Cargo doesn't allow combining `package = ...` with `workspace = true`,
# so the version + path are inlined here. Keep the version pinned to
# the workspace-wide `[workspace.package].version` so publishes stay
# in lock-step.
whisker = { package = "whisker-module-api", path = "../../crates/whisker-module-api", version = "0.1.0" }
