[package]
name = "whisker-video"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Whisker platform component module — `whisker-video:Video` element backed by AVPlayer on iOS / Media3 ExoPlayer on Android. Demonstrates `@WhiskerUIMethod` (`play()`, `pause()`, `seek(position)`) and `ElementRef<T>` for imperative Rust-side control of a mounted element."

# Phase K — explicit `include` list so a `cargo publish` of this crate
# ships the Kotlin + Swift platform sources alongside `src/lib.rs`.
# By default cargo includes everything under the package dir, but
# being explicit prevents accidentally publishing local Gradle / Xcode
# build artifacts if a stale build dir lingers next to the manifest.
include = [
    "Cargo.toml",
    "Package.swift",
    "build.gradle.kts",
    "src/lib.rs",
    "android/**/*.kt",
    "ios/**/*.swift",
    "README.md",
]

[lib]
crate-type = ["rlib"]

# Module-system opt-in marker. The bare table identifies this cargo
# crate as a Whisker module; `whisker-build` walks the consuming
# app's dep tree, picks out every dep carrying it, and wires the
# Android Gradle subproject (`android/build.gradle.kts`) + iOS
# SwiftPM package (`ios/Package.swift`) into the host build. No
# source list needed — the per-platform manifests are the source of
# truth.
[package.metadata.whisker]

[dependencies]
# Rename `whisker-module` → `whisker` so the proc macros' emit
# paths (`::whisker::ElementRef`, `::whisker::runtime::view::Element`,
# `::whisker::platform_module::WhiskerValue`, …) resolve in this
# module crate. The umbrella `whisker` crate isn't a dep — module
# crates only need the smaller `whisker-module` surface. See
# `crates/whisker-module/src/lib.rs` for the contract.
#
# Cargo doesn't allow combining `package = ...` with `workspace = true`,
# so the version + path are inlined here. Keep the version pinned to
# the workspace-wide `[workspace.package].version` so publishes stay
# in lock-step.
whisker = { package = "whisker-module", path = "../../crates/whisker-module", version = "0.1.0" }
