[package]
name = "whisker-hello-element"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Reference Whisker platform component module — registers `whisker-hello-element:Hello` (a system-pink UIView on iOS) and exposes `Hello` for use inside `render!`. Smoke-test / template for the Whisker module system."

include = [
    "Cargo.toml",
    "Package.swift",
    "build.gradle.kts",
    "src/lib.rs",
    "android/**/*.kt",
    "ios/**/*.swift",
    "README.md",
]

# rlib only. The Whisker module system handles native-source
# distribution out-of-band via the `android/` + `ios/` package dirs
# — we don't ship a cdylib here.
[lib]
crate-type = ["rlib"]

# Module-system opt-in marker. See `whisker-video/Cargo.toml` for the
# rationale; the bare table identifies this crate as a Whisker module.
[package.metadata.whisker]

[dependencies]
# Rename `whisker-modules-api` → `whisker` so the proc macros' emit
# paths resolve. See `crates/whisker-modules-api/src/lib.rs` for the
# rationale + contract. Cargo doesn't allow `package = ...` with
# `workspace = true`, so path + version are inlined here.
whisker = { package = "whisker-modules-api", path = "../../crates/whisker-modules-api", version = "0.1.0" }
