[package]
name = "whisker-hello-element"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Reference Whisker platform component module — registers `whisker-hello-element:Hello` (a system-pink UIView on iOS) and exposes `Hello` for use inside `render!`. Smoke-test / template for the Whisker module system."

include = [
    "Cargo.toml",
    "Package.swift",
    "build.gradle.kts",
    "src/lib.rs",
    "android/**/*.kt",
    "ios/**/*.swift",
    "README.md",
]

# rlib only. The Whisker module system handles native-source
# distribution out-of-band via the `android/` + `ios/` package dirs
# — we don't ship a cdylib here.
[lib]
crate-type = ["rlib"]

# Module-system opt-in marker. See `whisker-video/Cargo.toml` for the
# rationale; the bare table identifies this crate as a Whisker module.
[package.metadata.whisker]

[dependencies]
# The umbrella `whisker` crate — same dep app crates use. The proc
# macros' emit paths (`::whisker::*`) resolve under the `whisker`
# name. A published module would write `whisker = "0.1"`.
whisker = { workspace = true }
