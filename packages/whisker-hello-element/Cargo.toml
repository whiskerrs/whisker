[package]
name = "whisker-hello-element"
version = "0.1.0"
edition = "2021"
publish = false
description = "Reference Whisker native element module — registers `<x-hello>` (a system-pink UIView on iOS) and exposes `XHello` for use inside `render!`. Smoke-test / template for the Whisker module system."

# rlib only. The Whisker module system handles native-source
# distribution out-of-band via `whisker.module.toml` — we don't ship
# a cdylib here.
[lib]
crate-type = ["rlib"]

[dependencies]
whisker = { workspace = true }
