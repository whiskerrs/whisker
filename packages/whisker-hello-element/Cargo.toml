[package]
name = "whisker-hello-element"
version = "0.1.0"
edition = "2021"
publish = false
description = "Reference Whisker platform component module — registers `whisker-hello-element:Hello` (a system-pink UIView on iOS) and exposes `Hello` for use inside `render!`. Smoke-test / template for the Whisker module system."

# rlib only. The Whisker module system handles native-source
# distribution out-of-band via `whisker.module.toml` — we don't ship
# a cdylib here.
[lib]
crate-type = ["rlib"]

[dependencies]
# Rename `whisker-module-api` → `whisker` so the proc macros' emit
# paths resolve. See `crates/whisker-module-api/src/lib.rs` for the
# rationale + contract. Cargo doesn't allow `package = ...` with
# `workspace = true`, so path + version are inlined here.
whisker = { package = "whisker-module-api", path = "../../crates/whisker-module-api", version = "0.1.0" }
