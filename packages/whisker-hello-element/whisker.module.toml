# Whisker module manifest — marks this cargo crate as a Whisker
# module. The platform code + build manifests live at the package
# root in `android/` and `ios/` (Expo-style layout):
#
#   android/build.gradle.kts   — AGP library, sources in src/main/kotlin
#   ios/Package.swift          — SwiftPM library, sources in Sources/<Module>
#   src/lib.rs                 — the Rust shim (cargo crate root)
#
# whisker-build discovers the Android Gradle subproject via
# `android/build.gradle.kts` and the iOS SwiftPM package via
# `ios/Package.swift`; those are the per-platform source-of-truth,
# so no source-file list is needed here.

