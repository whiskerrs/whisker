[package]
name = "podcast-routing"
version = "0.1.0"
edition = "2024"
publish = false
description = "Routing surface for the podcast example: the `Navigator` struct (a thin navigate/back facade the feature crates read from context). Defined here, in a crate both `podcast-feature-browse` and `podcast-feature-detail` depend on, so the two features share the same Rust type when they look the value up via `use_context` — distinct structurally-identical types in each feature crate match on different `TypeId`s and the lookup returns `None`. The route tree itself now lives in the shell's `routes!` macro."

[lib]
crate-type = ["rlib"]

