[package]
name = "asset-demo"
version = "0.1.0"
edition = "2024"
publish = false
description = "Example app for `whisker-asset`. Bundles a PNG under `assets/` and displays it via `Image(src: asset!(\"images/logo.png\"))` so on-device verification of the Phase 3 native base wiring (iOS bundle dir / Android packaged assets) happens in one place."

[lib]
crate-type = ["rlib"]

[dependencies]
whisker = { workspace = true }
# The asset macros + runtime resolver. Pulled in for `asset!`; the
# plugin half (bundling) + module half (native base install) are
# wired through `whisker.rs`'s `app.plugin::<WhiskerAsset>` and the
# `[package.metadata.whisker]` marker on the crate.
whisker-asset = { workspace = true }
# Renders the bundled asset. whisker-image takes a resolved string and
# loads it (Kingfisher on iOS, Coil on Android); it does NOT depend on
# whisker-asset.
whisker-image = { path = "../../packages/whisker-image" }
