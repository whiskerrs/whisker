[package]
name = "router-smoke"
version = "0.1.0"
edition = "2024"
publish = false
description = "On-device smoke test for the new whisker-router rendering layer (phase 2): a tabbed app where each tab is its own Stack sharing a Detail route, driven by a hand-written RouteRegistry, with Slide transitions and iOS swipe-back."

[lib]
crate-type = ["rlib"]

[dependencies]
whisker = { workspace = true }
whisker-router = { workspace = true }
