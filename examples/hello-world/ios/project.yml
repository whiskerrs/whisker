name: HelloWorld
options:
  bundleIdPrefix: rs.whisker.examples
  deploymentTarget:
    iOS: '13.0'
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: '5.9'
    IPHONEOS_DEPLOYMENT_TARGET: '13.0'

packages:
  # SPM package living under native/ios — relative to this project.yml.
  WhiskerRuntime:
    path: ../../../native/ios

targets:
  HelloWorld:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: HelloWorld
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: rs.whisker.examples.helloWorld
        TARGETED_DEVICE_FAMILY: '1,2'
        # Resolve `@rpath/WhiskerDriver.framework/WhiskerDriver` (and
        # the Lynx frameworks that ship inside WhiskerRuntime's SPM
        # binaryTargets) at runtime. dyld walks this list of rpaths
        # for each `@rpath/…` install_name; without this entry the
        # embedded frameworks under `<App>.app/Frameworks/` would not
        # be found and dyld would abort the launch.
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
    dependencies:
      # `WhiskerRuntime` is a Swift library product — links statically
      # into the host app's main binary. The dynamic binaryTargets
      # inside the package (`WhiskerDriver`, `Lynx`, `LynxBase`,
      # `LynxServiceAPI`, `PrimJS`) are auto-embedded by Xcode 14+ into
      # `<App>.app/Frameworks/` based on the host target's product
      # type, so no explicit `embed:` flag is needed here — adding one
      # makes Xcode try to embed `WhiskerRuntime` itself, which fails
      # because it's not a framework.
      - package: WhiskerRuntime
