[package]
name = "hello-world"
version = "0.1.0"
edition = "2021"
publish = false

# Plain rlib. Host workflows (`cargo build`, `cargo test`, `cargo check`,
# rust-analyzer) only see this and succeed without a bridge — no
# unresolved `whisker_bridge_*` symbols. The mobile outputs are produced
# by `whisker-build` via `cargo rustc --crate-type dylib`:
#   Android: `whisker run/build --target android`  → dylib (libhello_world.so)
#   iOS:     `whisker run/build --target ios-sim`  → dylib (libhello_world.dylib)
#
# Both mobile sides use `dylib` (not `cdylib` / `staticlib`) so the
# subsecond JumpTable can resolve mangled host symbols at patch
# `dlopen` time — see `docs/hot-reload-plan.md` "Second Pivot".
[lib]
crate-type = ["rlib"]

[dependencies]
whisker = { workspace = true }

# Phase 7-Φ.F: the `Hello` native element lives in a separate
# module crate now. `whisker run` walks this app's dep tree, picks
# up the module's `whisker.module.toml`, and folds its Swift /
# Kotlin sources into the iOS / Android builds. Removing this dep
# removes the pink bar from the rendered output — a useful smoke
# test of the module-discovery pipeline.
whisker-hello-element = { path = "../../packages/whisker-hello-element" }

# Phase 7-Φ.E.8 demo: persist the heart-toggle bitmask in
# UserDefaults (iOS) / SharedPreferences (Android) so the liked
# mixes survive app restarts. The dep walk picks up the module's
# `whisker.module.toml`, stages the Swift / Kotlin
# `WhiskerLocalStoreImpl` into the gen tree, and the platform-side
# annotation discovery wires the registration end-to-end.
whisker-local-store = { path = "../../packages/whisker-local-store" }

# Phase 7-Φ.H.2.6 demo: imperative element-method dispatch
# (play / pause / seek) via `ElementRef<VideoProps>`. The video
# element shows Big Buck Bunny inside hello-world's main layout.
whisker-video = { path = "../../packages/whisker-video" }
