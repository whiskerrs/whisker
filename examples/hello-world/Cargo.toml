[package]
name = "hello-world"
version = "0.1.0"
edition = "2021"
publish = false

# Plain rlib. Host workflows (`cargo build`, `cargo test`, `cargo check`,
# rust-analyzer) only see this and succeed without a bridge — no
# unresolved `whisker_bridge_*` symbols. The mobile outputs are produced
# by `whisker-build` via `cargo rustc --crate-type dylib`:
#   Android: `whisker run/build --target android`  → dylib (libhello_world.so)
#   iOS:     `whisker run/build --target ios-sim`  → dylib (libhello_world.dylib)
#
# Both mobile sides use `dylib` (not `cdylib` / `staticlib`) so the
# subsecond JumpTable can resolve mangled host symbols at patch
# `dlopen` time — see `docs/hot-reload-plan.md` "Second Pivot".
[lib]
crate-type = ["rlib"]

[dependencies]
whisker = { workspace = true }
