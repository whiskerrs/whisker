[package]
name = "hello-world"
version = "0.1.0"
edition = "2021"
publish = false

# Three outputs:
# - `staticlib` is what the iOS xcframework wraps.
# - `cdylib` is the Android `.so` loaded via JNI.
# - `rlib` makes `cargo test` happy for the unit tests in src/lib.rs.
[lib]
crate-type = ["staticlib", "cdylib", "rlib"]

[dependencies]
lyra = { workspace = true }

# `lyra-build` runs from build.rs and does the bridge cc::Build +
# linker-arg dance for Android / iOS. The user's build.rs collapses
# to one line — see ./build.rs.
[build-dependencies]
lyra-build = { workspace = true }
