[package]
name = "hello-world"
version = "0.1.0"
edition = "2021"
publish = false

# Plain rlib. Host workflows (`cargo build`, `cargo test`, `cargo check`,
# rust-analyzer) only see this and succeed without a bridge — no
# unresolved `lyra_bridge_*` symbols. The mobile outputs are produced
# by xtask via `cargo rustc --crate-type X`:
#   Android: cargo xtask android cargo  → cdylib  (libhello_world.so)
#   iOS:     cargo xtask ios build-xcframework  → staticlib (libhello_world.a)
[lib]
crate-type = ["rlib"]

[dependencies]
lyra = { workspace = true }

# `lyra-build` runs from build.rs and does the bridge cc::Build +
# linker-arg dance for Android / iOS. The user's build.rs collapses
# to one line — see ./build.rs.
[build-dependencies]
lyra-build = { workspace = true }
