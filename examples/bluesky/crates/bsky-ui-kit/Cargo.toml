[package]
name = "bsky-ui-kit"
version = "0.1.0"
edition = "2024"
publish = false
description = "Reusable, stateless UI components for the Bluesky example (PostCard, Avatar). All values via props; reads no context."

[lib]
crate-type = ["rlib"]

[dependencies]
whisker = { workspace = true }
whisker-image = { path = "../../../../packages/whisker-image" }
# `whisker-icons` exposes every Lucide icon as a tree-shakable
# `pub const &str`; the timeline's engagement row uses `MessageCircle`
# / `Repeat2` / `Heart` instead of emoji.
whisker-icons = { path = "../../../../packages/whisker-icons" }
bsky-theme = { path = "../bsky-theme" }
bsky-domain = { path = "../bsky-domain" }
