[package]
name = "bluesky"
version = "0.1.0"
edition = "2024"
publish = false
description = "Bluesky (AT Protocol) client example. OAuth login via an embedded WebView (atrium-oauth, no hosted client metadata), session persisted with whisker-local-store, and an authenticated timeline. Demonstrates whisker's tokio feature carrying a full async networking + crypto stack on iOS/Android."

[lib]
crate-type = ["rlib"]

[dependencies]
whisker = { workspace = true, features = ["tokio"] }
whisker-router = { path = "../../packages/whisker-router" }
whisker-webview = { path = "../../packages/whisker-webview" }
whisker-input = { path = "../../packages/whisker-input" }
whisker-local-store = { path = "../../packages/whisker-local-store" }
whisker-image = { path = "../../packages/whisker-image" }
whisker-icons = { path = "../../packages/whisker-icons" }
whisker-safe-area = { path = "../../packages/whisker-safe-area" }
# Keyboard height (avoidance) + dismiss-on-navigation. Adding the dep
# also links the native Keyboard module, which is what lets
# whisker-router release focus on every navigation.
whisker-keyboard = { path = "../../packages/whisker-keyboard" }
bsky-domain = { path = "crates/bsky-domain" }
bsky-auth = { path = "crates/bsky-auth" }
# percent-encode at:// post URIs into a single route path segment
# (`/post/<encoded>`), decoded back in the post-detail screen.
urlencoding = "2"
bsky-theme = { path = "crates/bsky-theme" }
bsky-ui-kit = { path = "crates/bsky-ui-kit" }
