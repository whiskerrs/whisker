name: HelloLyra
options:
  bundleIdPrefix: dev.lyra.examples
  deploymentTarget:
    iOS: '13.0'
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: '5.9'
    IPHONEOS_DEPLOYMENT_TARGET: '13.0'

packages:
  LyraRuntime:
    path: ../../native/ios

targets:
  HelloLyra:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: HelloLyra
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.lyra.examples.helloLyra
        TARGETED_DEVICE_FAMILY: '1,2'
    dependencies:
      - package: LyraRuntime
