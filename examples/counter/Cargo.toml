[package]
name = "counter"
version = "0.1.0"
edition = "2021"
publish = false
description = "Minimal Whisker counter — canonical Phase 6.5a render! / signal example."

# Plain rlib. The example proves the new reactive surface compiles
# and the macro expansion behaves as documented. Mobile deployment
# (the `whisker_app_main` FFI path) wires up only once Step 5b
# rebuilds the production bootstrap against the new `render!` /
# `ElementHandle` return type — see #11.
[lib]
crate-type = ["rlib"]

[dependencies]
whisker = { workspace = true }
